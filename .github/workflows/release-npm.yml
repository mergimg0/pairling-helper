# Publishes the Pairling npm packages with provenance via npm Trusted
# Publishing (OIDC). No npm tokens exist anywhere in this pipeline.
#
# Custody model: the Developer ID private key never leaves the release Mac.
# Binaries are built, signed, and notarized locally, uploaded as GitHub
# Release assets, and their SHA-256 digests are committed to
# RELEASE-BINARIES.json in the tagged commit. This job verifies the assets
# against the committed digests and the pinned Apple Team ID, assembles the
# packages from the mirrored sources, and publishes. Provenance therefore
# attests the exact commit whose committed digests pin the binaries.
name: release-npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (e.g. v0.1.0). Idempotent — skips versions already on the registry.
        required: true
        type: string
      channel:
        description: npm dist-tag. This workflow only ever publishes to "next"; "latest" is promoted separately via `npm dist-tag add` after device proof.
        required: false
        default: next
        type: choice
        options:
          - next

permissions: {}

env:
  PAIRLING_TEAM_ID: 965AVD34A3

jobs:
  publish:
    if: github.repository == 'mergimg0/pairling-helper'
    runs-on: macos-15
    environment: npm-publish
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Check out release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Update npm (OIDC trusted publishing support)
        run: npm install -g npm@latest && npm --version

      - name: Download signed binaries from release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          mkdir -p dist/assets
          gh release download "$TAG" --pattern 'pairling-connectd-*' --dir dist/assets
          gh release download "$TAG" --pattern 'pairling-python-*.tar.gz' --dir dist/assets
          chmod 755 dist/assets/pairling-connectd-arm64 dist/assets/pairling-connectd-x64

      - name: Verify assets against committed digests and Team ID
        run: |
          python3 - <<'PY'
          import hashlib, json, subprocess, sys, tarfile, tempfile
          expected = json.load(open("RELEASE-BINARIES.json"))
          team = "${{ env.PAIRLING_TEAM_ID }}"
          def sha(path):
              return hashlib.sha256(open(path, "rb").read()).hexdigest()
          def codesign_fields(path):
              info = subprocess.run(["/usr/bin/codesign", "-dvv", path], capture_output=True, text=True)
              blob = (info.stdout or "") + (info.stderr or "")
              out = {}
              for line in blob.splitlines():
                  if "=" in line:
                      k, _, v = line.partition("=")
                      out[k] = v
              return out
          # connectd binaries: digest + Developer ID signature + Team ID.
          for arch in ("arm64", "x64"):
              path = f"dist/assets/pairling-connectd-{arch}"
              if sha(path) != expected["binaries"][arch]["sha256"]:
                  sys.exit(f"{path}: sha256 mismatch")
              subprocess.run(["/usr/bin/codesign", "--verify", "--strict", path], check=True)
              f = codesign_fields(path)
              if f.get("TeamIdentifier") != team:
                  sys.exit(f"{path}: TeamIdentifier {f.get('TeamIdentifier')!r} != {team}")
              print(f"verified {path}: sha256 + signature + TeamIdentifier={team}")
          # python tarballs: digest, then unpack and verify the interpreter is a
          # valid dev.pairling.python Developer ID build (CI must not re-sign).
          for arch in ("arm64", "x64"):
              path = f"dist/assets/pairling-python-{arch}.tar.gz"
              if sha(path) != expected["python"][arch]["sha256"]:
                  sys.exit(f"{path}: sha256 mismatch")
              tmp = tempfile.mkdtemp()
              with tarfile.open(path) as t:
                  t.extractall(tmp)
              py = f"{tmp}/python/bin/python3"
              subprocess.run(["/usr/bin/codesign", "--verify", "--strict", py], check=True)
              f = codesign_fields(py)
              if f.get("TeamIdentifier") != team:
                  sys.exit(f"{py}: TeamIdentifier {f.get('TeamIdentifier')!r} != {team}")
              if f.get("Identifier") != "dev.pairling.python":
                  sys.exit(f"{py}: Identifier {f.get('Identifier')!r} != dev.pairling.python")
              print(f"verified {path}: sha256 + dev.pairling.python + TeamIdentifier={team}")
          PY

      - name: Assemble packages from mirrored sources
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          # CI passes pre-signed connectd AND python as prebuilts; the build
          # never re-vendors or re-signs (no Developer ID cert in CI).
          bash mac/packaging/build-npm-packages.sh \
            --release \
            --version "${TAG#v}" \
            --prebuilt-arm64 dist/assets/pairling-connectd-arm64 \
            --prebuilt-x64 dist/assets/pairling-connectd-x64 \
            --prebuilt-python-arm64 dist/assets/pairling-python-arm64.tar.gz \
            --prebuilt-python-x64 dist/assets/pairling-python-x64.tar.gz
          cat dist/npm/SHASUMS256.txt

      - name: Publish with provenance (runtime packages first, meta last)
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
          DISPATCH_CHANNEL: ${{ inputs.channel }}
        run: |
          VERSION="${TAG#v}"
          # FAIL-CLOSED dist-tag policy. This workflow publishes ONLY to `next`.
          # `latest` is never produced by an automated publish; an operator
          # promotes it with `npm dist-tag add <pkg>@$VERSION latest` for all
          # three packages after on-device proof.
          if [ "$EVENT_NAME" = "release" ]; then
            # A release event must be a GitHub pre-release. A normal (non-pre)
            # release implies intent to ship latest, which this workflow refuses:
            # fail closed and force promotion via npm dist-tag add.
            if [ "$IS_PRERELEASE" != "true" ]; then
              echo "::error::Refusing to publish: GitHub Release is not a pre-release. This workflow only publishes to next; promote to latest with npm dist-tag add after device proof." >&2
              exit 1
            fi
            CHANNEL="next"
          else
            CHANNEL="${DISPATCH_CHANNEL:-next}"
          fi
          # Hard guard: never publish to anything but next, whatever computed it.
          if [ "$CHANNEL" != "next" ]; then
            echo "::error::Refusing to publish to dist-tag '$CHANNEL'. This workflow only publishes to next; latest is promoted via npm dist-tag add." >&2
            exit 1
          fi
          echo "publishing channel: $CHANNEL"
          # Idempotent: skip any version already on the registry so a re-run
          # after fixing a per-package trusted-publisher gap only publishes the
          # missing packages (re-publishing an existing version is a hard error).
          publish_if_absent() {
            local pkg="$1" tarball="$2"
            if npm view "$pkg@$VERSION" version >/dev/null 2>&1; then
              echo "skip: $pkg@$VERSION already published"
              return 0
            fi
            echo "publishing $pkg@$VERSION --tag $CHANNEL"
            npm publish "$tarball" --provenance --access public --tag "$CHANNEL"
          }
          publish_if_absent "@pairling/runtime-darwin-arm64" "dist/npm/pairling-runtime-darwin-arm64-$VERSION.tgz"
          publish_if_absent "@pairling/runtime-darwin-x64" "dist/npm/pairling-runtime-darwin-x64-$VERSION.tgz"
          publish_if_absent "pairling" "dist/npm/pairling-$VERSION.tgz"
