# Publishes the Pairling npm packages with provenance via npm Trusted
# Publishing (OIDC). No npm tokens exist anywhere in this pipeline.
#
# Custody model: the Developer ID private key never leaves the release Mac.
# Binaries are built, signed, and notarized locally, uploaded as GitHub
# Release assets, and their SHA-256 digests are committed to
# RELEASE-BINARIES.json in the tagged commit. This job verifies the assets
# against the committed digests and the pinned Apple Team ID, assembles the
# packages from the mirrored sources, and publishes. Provenance therefore
# attests the exact commit whose committed digests pin the binaries.
name: release-npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (e.g. v0.1.0). Idempotent — skips versions already on the registry.
        required: true
        type: string

permissions: {}

env:
  PAIRLING_TEAM_ID: 965AVD34A3

jobs:
  publish:
    if: github.repository == 'mergimg0/pairling-helper'
    runs-on: macos-15
    environment: npm-publish
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Check out release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Update npm (OIDC trusted publishing support)
        run: npm install -g npm@latest && npm --version

      - name: Download signed binaries from release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          mkdir -p dist/assets
          gh release download "$TAG" --pattern 'pairling-connectd-*' --dir dist/assets
          chmod 755 dist/assets/pairling-connectd-arm64 dist/assets/pairling-connectd-x64

      - name: Verify assets against committed digests and Team ID
        run: |
          python3 - <<'PY'
          import hashlib, json, subprocess, sys
          expected = json.load(open("RELEASE-BINARIES.json"))
          team = "${{ env.PAIRLING_TEAM_ID }}"
          for arch in ("arm64", "x64"):
              path = f"dist/assets/pairling-connectd-{arch}"
              digest = hashlib.sha256(open(path, "rb").read()).hexdigest()
              want = expected["binaries"][arch]["sha256"]
              if digest != want:
                  sys.exit(f"{path}: sha256 {digest} != committed {want}")
              subprocess.run(["/usr/bin/codesign", "--verify", "--strict", path], check=True)
              info = subprocess.run(["/usr/bin/codesign", "-dvv", path], capture_output=True, text=True)
              fields = (info.stdout or "") + (info.stderr or "")
              line = next((l for l in fields.splitlines() if l.startswith("TeamIdentifier=")), "")
              if line != f"TeamIdentifier={team}":
                  sys.exit(f"{path}: unexpected {line!r}")
              print(f"verified {path}: sha256 + signature + TeamIdentifier={team}")
          PY

      - name: Assemble packages from mirrored sources
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          bash mac/packaging/build-npm-packages.sh \
            --release \
            --version "${TAG#v}" \
            --prebuilt-arm64 dist/assets/pairling-connectd-arm64 \
            --prebuilt-x64 dist/assets/pairling-connectd-x64
          cat dist/npm/SHASUMS256.txt

      - name: Publish with provenance (runtime packages first, meta last)
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          VERSION="${TAG#v}"
          # Idempotent: skip any version already on the registry so a re-run
          # after fixing a per-package trusted-publisher gap only publishes the
          # missing packages (re-publishing an existing version is a hard error).
          publish_if_absent() {
            local pkg="$1" tarball="$2"
            if npm view "$pkg@$VERSION" version >/dev/null 2>&1; then
              echo "skip: $pkg@$VERSION already published"
              return 0
            fi
            echo "publishing $pkg@$VERSION"
            npm publish "$tarball" --provenance --access public
          }
          publish_if_absent "@pairling/runtime-darwin-arm64" "dist/npm/pairling-runtime-darwin-arm64-$VERSION.tgz"
          publish_if_absent "@pairling/runtime-darwin-x64" "dist/npm/pairling-runtime-darwin-x64-$VERSION.tgz"
          publish_if_absent "pairling" "dist/npm/pairling-$VERSION.tgz"
